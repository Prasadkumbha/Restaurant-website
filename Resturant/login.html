<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RFC Login Page</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome (for icons, optional) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    .login-container {
      background: #fff;
      text-align: center;
      max-width: 380px;
      width: 100%;
      padding: 25px 25px 30px;
      border-radius: 12px;
      box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
    }

    .login-logo {
      width: 120px;
      height: auto;
      margin-bottom: 15px;
    }

    h5 {
      font-size: 1.1rem;
      margin-bottom: 20px;
    }

    .form-control {
      border-radius: 6px;
      border: 1px solid #ddd;
      text-align: center;
      padding: 10px;
      font-size: 0.95rem;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #d32f2f;
    }

    .btn-main {
      background-color: #000;
      color: white;
      border-radius: 25px;
      width: 100%;
      margin-top: 15px;
      padding: 10px;
    }

    .btn-main:hover {
      background-color: #d32f2f;
      color: #fff;
    }

    .btn-outline {
      border-radius: 25px;
      border: 1px solid #000;
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background-color: transparent;
    }

    small {
      color: #555;
      font-size: 0.8rem;
    }

    a {
      text-decoration: none;
      color: #d32f2f;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <img src="logo.png" alt="Logo" class="login-logo">
    <h6 class="text-muted mb-2">Sign In</h6>
    <h5 class="fw-bold mb-3">Let’s Sign In<br>with Your Email!</h5>

    <form id="loginForm">
      <input type="email" class="form-control mb-3" id="email" placeholder="Email Address*" required>
      <input type="password" class="form-control mb-2" id="password" placeholder="Password*" required>

      <a href="#" class="d-block text-end text-muted mb-2">Forgot Password?</a>

      <button type="submit" class="btn btn-main">Login</button>
      <div class="mt-2">or</div>
      <button type="button" class="btn btn-outline">Skip, Continue as Guest</button>

      <small class="d-block mt-3">
        By logging in, you agree to our 
        <a href="#">Privacy Policy</a> and 
        <a href="#">Terms & Conditions</a>.
      </small>
    </form>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (email === "test@mail.com" && password === "123456") {
        alert("Login successful! Welcome back 🎉");
      } else {
        alert("Invalid email or password. Please try again.");
      }
    });
  </script>
</body>
</html>
