<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Cart - RFC</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root { --kfc-red:#D62300; --kfc-yellow:#FFC72C; }
    body {font-family:'Poppins',sans-serif;background:#f8f9fa;}
    .header {background:var(--kfc-red);color:#fff;padding:1.5rem 0;text-align:center;font-weight:700;font-size:1.5rem;}
    .cart-item {display:flex;align-items:center;padding:1rem;border-bottom:1px solid #eee;gap:12px;}
    .cart-item img {width:70px;height:70px;object-fit:cover;border-radius:8px;border:2px solid var(--kfc-yellow);}
    .item-details {flex:1;}
    .item-details h6 {margin:0;font-weight:600;}
    .price-line {color:#555;font-size:0.95rem;}
    .qty-group {display:flex;align-items:center;gap:8px;}
    .qty-btn {width:32px;height:32px;border-radius:50%;background:#fff;color:var(--kfc-red);border:2px solid var(--kfc-red);font-weight:bold;cursor:pointer;transition:.2s;}
    .qty-btn:hover {background:var(--kfc-red);color:#fff;}
    .qty {min-width:30px;text-align:center;font-weight:600;}
    .remove-btn {color:#dc3545;font-size:1.2rem;cursor:pointer;}
    .summary {background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 4px 12px rgba(0,0,0,.1);}
    .summary-row {display:flex;justify-content:space-between;padding:.5rem 0;font-size:1rem;}
    .total-row {font-weight:bold;font-size:1.2rem;color:var(--kfc-red);border-top:2px solid #eee;padding-top:1rem;margin-top:1rem;}
    .empty-cart {text-align:center;padding:3rem;color:#888;}
    .empty-cart i {font-size:3rem;color:#ddd;margin-bottom:1rem;}
    .pay-btn {background:var(--kfc-red);border:none;font-weight:600;padding:.75rem;font-size:1.1rem;}
    .pay-btn:hover {background:#b71c1c;}
    .back-btn {background:#6c757d;color:#fff;}
    .back-btn:hover {background:#5a6268;}
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header"><i class="fas fa-shopping-cart"></i> Your Cart</div>

  <div class="container my-5">
    <div class="row">
      <!-- CART ITEMS -->
      <div class="col-lg-8">
        <div class="bg-white rounded shadow-sm p-4" id="cartItemsContainer">
          <!-- Filled by JS -->
        </div>
      </div>

      <!-- SUMMARY -->
      <div class="col-lg-4">
        <div class="summary">
          <h5 class="mb-3">Order Summary</h5>
          <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
          <div class="summary-row"><span>Tax (5%)</span><span id="tax">₹0</span></div>
          <div class="total-row"><span>Total</span><span id="total">₹0</span></div>

          <div class="d-grid gap-2 mt-4">
            <button id="payBtn" class="btn pay-btn" disabled>Proceed to Pay</button>
            <a href="menu.html" class="btn back-btn">Continue Shopping</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <script>
    /* ---------- CART LOGIC ---------- */
    let cart = JSON.parse(localStorage.getItem('kfcCart') || '[]');

    const container = document.getElementById('cartItemsContainer');
    const subtotalEl = document.getElementById('subtotal');
    const taxEl      = document.getElementById('tax');
    const totalEl    = document.getElementById('total');
    const payBtn     = document.getElementById('payBtn');

    /* ---- render ---- */
    function renderCart() {
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <i class="fas fa-shopping-cart"></i>
            <h5>Your cart is empty</h5>
            <p>Add delicious items from the menu!</p>
            <a href="menu.html" class="btn btn-outline-danger">Go to Menu</a>
          </div>`;
        updateSummary();
        payBtn.disabled = true;
        return;
      }

      let html = '';
      cart.forEach((item, i) => {
        const lineTotal = item.price * item.qty;
        html += `
          <div class="cart-item">
            <img src="${item.img}" alt="${item.name}">
            <div class="item-details">
              <h6>${item.name}</h6>
              <div class="price-line">
                ₹${item.price} × ${item.qty} = ₹${lineTotal}
              </div>
            </div>
            <div class="qty-group">
              <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
              <span class="qty">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
            </div>
            <button class="remove-btn" onclick="removeItem(${i})"><i class="fas fa-trash"></i></button>
          </div>`;
      });

      container.innerHTML = html;
      updateSummary();
      payBtn.disabled = false;
    }

    /* ---- qty ---- */
    window.changeQty = (i, delta) => {
      const newQty = cart[i].qty + delta;
      if (newQty < 1) { removeItem(i); return; }
      cart[i].qty = newQty;
      saveCart();
      renderCart();
    };

    /* ---- remove ---- */
    window.removeItem = (i) => {
      cart.splice(i, 1);
      saveCart();
      renderCart();
    };

    /* ---- persist ---- */
    function saveCart() {
      localStorage.setItem('kfcCart', JSON.stringify(cart));
    }

    /* ---- summary ---- */
    function updateSummary() {
      const subtotal = cart.reduce((s, it) => s + it.price * it.qty, 0);
      const tax = Math.round(subtotal * 0.05);
      const total = subtotal + tax;

      subtotalEl.textContent = `₹${subtotal}`;
      taxEl.textContent      = `₹${tax}`;
      totalEl.textContent    = `₹${total}`;
    }

    /* ---- Razorpay ---- */
    payBtn.addEventListener('click', () => {
      const subtotal = cart.reduce((s, it) => s + it.price * it.qty, 0);
      const total = subtotal + Math.round(subtotal * 0.05);

      const options = {
        key: 'rzp_test_YOUR_KEY',          // <-- put your test key here
        amount: total * 100,               // paise
        currency: 'INR',
        name: 'RFC Online',
        description: 'Order Payment',
        image: 'logo.png',
        handler: function (resp) {
          alert('Payment successful! ID: ' + resp.razorpay_payment_id);
          localStorage.removeItem('kfcCart');
          location.href = 'thankyou.html'; // create a thank-you page
        },
        prefill: { name: '', email: '', contact: '' },
        theme: { color: '#D62300' }
      };
      new Razorpay(options).open();
    });

    /* ---- init ---- */
    renderCart();
  </script>
</body>
</html>
